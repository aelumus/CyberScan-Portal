name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Frontend:ESLint + TypeScript
  lint-frontend:
    name: "Frontend · Lint & Types"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Audit dependencies (SCA)
        run: npm audit --audit-level=critical


  # Backend:Ruff linter + formatter 
  lint-backend:
    name: "Backend · Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - name: Install Security Tools
        run: pip install bandit pip-audit

      - name: Run Bandit (SAST)
        run: bandit -r backend/ -x backend/gen_test_malware.py -ll


      - name: Run pip-audit (SCA)
        run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2026-1325


  # Docker: build both images
  build:
    name: "Docker · Build Images"
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for build
        run: cp .env.example .env

      - name: Build all services
        run: docker compose build
        
  # DAST: OWASP ZAP Baseline against running stack
  dast:
    name: "DAST · ZAP Baseline"
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Create reports dir
        run: mkdir -p zap-reports

      - name: Start app (caddy + backend + frontend + worker)
        run: docker compose up -d --build caddy backend frontend worker

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost/api/health; then
              echo "healthy"
              exit 0
            fi
            echo "waiting... $i"
            sleep 5
          done
          echo "health check failed"
          docker compose ps
          docker compose logs --tail=80 backend caddy
          exit 1

      - name: Run ZAP Baseline
        continue-on-error: true
        run: docker compose --profile dast run --rm zap

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-reports/
          if-no-files-found: warn
