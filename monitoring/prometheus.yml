global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI backend — HTTP metrics + custom scan gauges
  - job_name: "backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  # cAdvisor — Docker container CPU / RAM / network
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Node Exporter — host system CPU / RAM / disk
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
