services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cyberscan-backend
    env_file: .env
    environment:
      DB_PATH: /app/data/scans.db
      UPLOAD_DIR: /app/data/uploads
      RELOAD: "false"
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: cyberscan-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
