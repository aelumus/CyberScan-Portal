services:
  caddy:
    image: caddy:2-alpine
    container_name: cyberscan-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cyberscan-backend
    env_file: .env
    environment:
      DB_PATH: /app/data/scans.db
      UPLOAD_DIR: /app/data/uploads
      RELOAD: "false"
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: cyberscan-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
  caddy-data:
  caddy-config:
